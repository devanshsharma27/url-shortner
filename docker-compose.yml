services:
  postgres:
    image: postgres:16
    container_name: url_shortener_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: shortener_user
      POSTGRES_PASSWORD: shortener_pass
      POSTGRES_DB: shortener_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
